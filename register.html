<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/png" href="assets/images/favarit/fa.png"/>
<title>MAI — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#f1f1f1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(108,99,255,0.15) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:absolute;bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,101,132,0.1) 0%,transparent 70%);pointer-events:none}
.card{background:#16162a;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:36px 32px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
.logo-text{font-size:28px;font-weight:800;background:linear-gradient(135deg,#6C63FF,#FF6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:#a0a0c0;text-align:center;margin-bottom:24px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#a0a0c0;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;background:#1e1e35;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;color:#f1f1f1;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
input:focus{border-color:#6C63FF}
input::placeholder{color:#6b6b8a}
.ref-note{font-size:11px;color:#a0a0c0;margin-top:5px}
.ref-note span{color:#22c55e}
.btn{width:100%;background:linear-gradient(135deg,#6C63FF,#FF6584);color:white;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;box-shadow:0 4px 20px rgba(108,99,255,0.4)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,99,255,0.5)}
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.link-row{text-align:center;margin-top:18px;font-size:13px;color:#a0a0c0}
.link-row a{color:#6C63FF;text-decoration:none;font-weight:600}
.link-row a:hover{text-decoration:underline}
.ref-highlight{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#a0a0c0}
.ref-highlight strong{color:#22c55e;display:block;margin-bottom:3px;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="17" fill="url(#lg)"/><path d="M11 23L17 11L23 23" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 19h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="34" y2="34"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#FF6584"/></linearGradient></defs></svg>
    <span class="logo-text">MAI</span>
  </div>
  <h2>Create Account</h2>
  <p class="sub">Join MAI and start earning today</p>
  <div class="ref-highlight">
    <strong>🔑 Referral Code Required</strong>
    You need an invite code from an existing member to register.
  </div>
  <div class="err" id="errMsg"></div>
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="username" placeholder="Enter your full name"/>
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email"/>
  </div>
  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="+1 234 567 8900"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters"/>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat your password"/>
  </div>
  <div class="form-group">
    <label>Referral / Invite Code <span style="color:#ef4444">*</span></label>
    <input type="text" id="refCode" placeholder="e.g. MAI-A5-2024" style="text-transform:uppercase"/>
    <div class="ref-note">Ask your inviter for their code. <span>Required to join.</span></div>
  </div>
  <button class="btn" onclick="doRegister()">Create Account</button>
  <div class="link-row">Already have an account? <a href="login.html">Sign In</a></div>
</div>
<script src="assets/js/api.js"></script>
<script>
(function(){
  var u = API.getCurrentUser();
  if (u && API.getToken()) window.location.href = 'index.html';
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref');
  if (ref) document.getElementById('refCode').value = ref.toUpperCase();
})();

async function doRegister() {
  var errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';
  var username = document.getElementById('username').value.trim();
  var email    = document.getElementById('email').value.trim();
  var phone    = document.getElementById('phone').value.trim();
  var password = document.getElementById('password').value;
  var confirm  = document.getElementById('confirm').value;
  var refCode  = document.getElementById('refCode').value.trim().toUpperCase();

  if (!username || !email || !password || !confirm || !refCode) {
    errEl.textContent = 'All fields are required'; errEl.style.display = 'block'; return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return;
  }
  var res = await API.register({ username, email, phone, password, referralCode: refCode });
  if (!res.ok) { errEl.textContent = res.msg; errEl.style.display = 'block'; return; }
  window.location.href = 'index.html';
}
</script>
</body>
</html>
