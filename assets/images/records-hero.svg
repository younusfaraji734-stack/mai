<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="recordsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="chart2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#recordsBg)"/>
  
  <!-- Transaction list visualization -->
  <rect x="50" y="40" width="300" height="120" fill="rgba(255,255,255,0.05)" rx="12"/>
  
  <!-- Transaction rows -->
  <rect x="70" y="60" width="260" height="20" fill="rgba(34,197,94,0.1)" rx="10"/>
  <circle cx="85" cy="70" r="6" fill="#22c55e"/>
  <text x="105" y="73" font-family="Arial" font-size="10" font-weight="600" fill="#22c55e">+$50.00 USDT</text>
  <text x="300" y="73" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="end">Deposit</text>
  
  <rect x="70" y="90" width="260" height="20" fill="rgba(108,99,255,0.1)" rx="10"/>
  <circle cx="85" cy="100" r="6" fill="#6C63FF"/>
  <text x="105" y="103" font-family="Arial" font-size="10" font-weight="600" fill="#6C63FF">+$2.60 USDT</text>
  <text x="300" y="103" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="end">Profit</text>
  
  <rect x="70" y="120" width="260" height="20" fill="rgba(239,68,68,0.1)" rx="10"/>
  <circle cx="85" cy="130" r="6" fill="#ef4444"/>
  <text x="105" y="133" font-family="Arial" font-size="10" font-weight="600" fill="#ef4444">-$20.00 USDT</text>
  <text x="300" y="133" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="end">Withdraw</text>
  
  <!-- Summary stats -->
  <rect x="80" y="20" width="60" height="15" fill="rgba(34,197,94,0.2)" rx="7"/>
  <text x="110" y="30" font-family="Arial" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle">+$177.50</text>
  
  <rect x="170" y="20" width="60" height="15" fill="rgba(239,68,68,0.2)" rx="7"/>
  <text x="200" y="30" font-family="Arial" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">-$140.00</text>
  
  <rect x="260" y="20" width="60" height="15" fill="rgba(108,99,255,0.2)" rx="7"/>
  <text x="290" y="30" font-family="Arial" font-size="10" font-weight="700" fill="#6C63FF" text-anchor="middle">6 Total</text>
  
  <!-- Floating elements -->
  <circle cx="30" cy="100" r="4" fill="rgba(34,197,94,0.6)">
    <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="100" r="4" fill="rgba(239,68,68,0.6)">
    <animate attributeName="cy" values="100;110;100" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="180" r="3" fill="rgba(108,99,255,0.6)">
    <animate attributeName="cy" values="180;170;180" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>