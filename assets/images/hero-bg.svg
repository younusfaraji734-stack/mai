<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="30%" style="stop-color:#1a1040"/>
      <stop offset="70%" style="stop-color:#2a1f4e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6584;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FF6584;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#heroBg)"/>
  
  <!-- Floating orbs -->
  <circle cx="150" cy="100" r="80" fill="url(#orb1)">
    <animate attributeName="cx" values="150;180;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="650" cy="200" r="100" fill="url(#orb2)">
    <animate attributeName="cx" values="650;620;650" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;180;200" dur="7s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="100" cy="400" r="60" fill="url(#orb1)">
    <animate attributeName="cx" values="100;130;100" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="400;420;400" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Geometric shapes -->
  <polygon points="700,50 720,80 700,110 680,80" fill="rgba(108,99,255,0.1)" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" values="0 700 80;360 700 80" dur="20s" repeatCount="indefinite"/>
  </polygon>
  
  <polygon points="50,300 70,330 50,360 30,330" fill="rgba(255,101,132,0.1)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" values="0 50 330;-360 50 330" dur="25s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Connecting lines -->
  <line x1="200" y1="150" x2="600" y2="250" stroke="rgba(108,99,255,0.1)" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </line>
  
  <line x1="150" y1="400" x2="650" y2="300" stroke="rgba(255,101,132,0.1)" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </line>
</svg>