<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg1)"/>
  
  <!-- Buildings -->
  <rect x="50" y="120" width="60" height="120" fill="url(#building)" rx="4"/>
  <rect x="130" y="80" width="70" height="160" fill="url(#building)" rx="4"/>
  <rect x="220" y="100" width="55" height="140" fill="url(#building)" rx="4"/>
  <rect x="295" y="90" width="65" height="150" fill="url(#building)" rx="4"/>
  
  <!-- Windows -->
  <rect x="60" y="140" width="8" height="8" fill="rgba(102,126,234,0.8)" rx="1"/>
  <rect x="75" y="140" width="8" height="8" fill="rgba(102,126,234,0.8)" rx="1"/>
  <rect x="90" y="140" width="8" height="8" fill="rgba(102,126,234,0.8)" rx="1"/>
  <rect x="60" y="160" width="8" height="8" fill="rgba(102,126,234,0.8)" rx="1"/>
  <rect x="75" y="160" width="8" height="8" fill="rgba(102,126,234,0.8)" rx="1"/>
  <rect x="90" y="160" width="8" height="8" fill="rgba(102,126,234,0.8)" rx="1"/>
  
  <!-- MAI Logo -->
  <circle cx="200" cy="60" r="25" fill="rgba(255,255,255,0.95)"/>
  <text x="200" y="68" font-family="Arial Black" font-size="24" font-weight="900" fill="#6C63FF" text-anchor="middle">M</text>
  
  <!-- Floating elements -->
  <circle cx="80" cy="70" r="3" fill="rgba(255,255,255,0.6)">
    <animate attributeName="cy" values="70;60;70" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="50" r="4" fill="rgba(255,255,255,0.5)">
    <animate attributeName="cy" values="50;40;50" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="40" r="2" fill="rgba(255,255,255,0.7)">
    <animate attributeName="cy" values="40;30;40" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>