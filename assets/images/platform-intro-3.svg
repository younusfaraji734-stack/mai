<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="hands" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg3)"/>
  
  <!-- Handshake -->
  <ellipse cx="150" cy="150" rx="40" ry="25" fill="url(#hands)" transform="rotate(-20 150 150)"/>
  <ellipse cx="250" cy="150" rx="40" ry="25" fill="url(#hands)" transform="rotate(20 250 150)"/>
  
  <!-- Connection line -->
  <line x1="190" y1="150" x2="210" y2="150" stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- People icons -->
  <circle cx="100" cy="120" r="15" fill="rgba(255,255,255,0.9)"/>
  <rect x="85" y="135" width="30" height="40" fill="rgba(255,255,255,0.9)" rx="15"/>
  
  <circle cx="300" cy="120" r="15" fill="rgba(255,255,255,0.9)"/>
  <rect x="285" y="135" width="30" height="40" fill="rgba(255,255,255,0.9)" rx="15"/>
  
  <!-- Network nodes -->
  <circle cx="80" cy="200" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="150" cy="220" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="250" cy="220" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="320" cy="200" r="6" fill="rgba(255,255,255,0.7)"/>
  
  <!-- Connection lines -->
  <line x1="80" y1="200" x2="150" y2="220" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="150" y1="220" x2="250" y2="220" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="250" y1="220" x2="320" y2="200" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  
  <!-- Dollar signs -->
  <text x="200" y="100" font-family="Arial Black" font-size="20" font-weight="900" fill="rgba(255,255,255,0.8)" text-anchor="middle">$</text>
  <text x="120" y="80" font-family="Arial Black" font-size="16" font-weight="900" fill="rgba(255,255,255,0.6)" text-anchor="middle">$</text>
  <text x="280" y="80" font-family="Arial Black" font-size="16" font-weight="900" fill="rgba(255,255,255,0.6)" text-anchor="middle">$</text>
</svg>