<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.85"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg4)"/>
  
  <!-- Book -->
  <rect x="150" y="80" width="100" height="140" fill="url(#book)" rx="6"/>
  <rect x="150" y="80" width="15" height="140" fill="rgba(67,233,123,0.3)" rx="6"/>
  
  <!-- Book pages -->
  <line x1="175" y1="110" x2="230" y2="110" stroke="rgba(67,233,123,0.6)" stroke-width="2"/>
  <line x1="175" y1="125" x2="235" y2="125" stroke="rgba(67,233,123,0.6)" stroke-width="2"/>
  <line x1="175" y1="140" x2="220" y2="140" stroke="rgba(67,233,123,0.6)" stroke-width="2"/>
  <line x1="175" y1="155" x2="240" y2="155" stroke="rgba(67,233,123,0.6)" stroke-width="2"/>
  <line x1="175" y1="170" x2="225" y2="170" stroke="rgba(67,233,123,0.6)" stroke-width="2"/>
  
  <!-- Steps -->
  <circle cx="100" cy="120" r="12" fill="rgba(255,255,255,0.9)"/>
  <text x="100" y="126" font-family="Arial Black" font-size="14" font-weight="900" fill="#43e97b" text-anchor="middle">1</text>
  
  <circle cx="300" cy="120" r="12" fill="rgba(255,255,255,0.9)"/>
  <text x="300" y="126" font-family="Arial Black" font-size="14" font-weight="900" fill="#43e97b" text-anchor="middle">2</text>
  
  <circle cx="100" cy="180" r="12" fill="rgba(255,255,255,0.9)"/>
  <text x="100" y="186" font-family="Arial Black" font-size="14" font-weight="900" fill="#43e97b" text-anchor="middle">3</text>
  
  <circle cx="300" cy="180" r="12" fill="rgba(255,255,255,0.9)"/>
  <text x="300" y="186" font-family="Arial Black" font-size="14" font-weight="900" fill="#43e97b" text-anchor="middle">4</text>
  
  <!-- Arrows -->
  <path d="M115 120 L135 120" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M265 120 L285 120" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M200 235 L200 255" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Success icon -->
  <circle cx="200" cy="40" r="18" fill="rgba(255,255,255,0.9)"/>
  <path d="M192 40 L198 46 L208 34" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.8)"/>
    </marker>
  </defs>
</svg>